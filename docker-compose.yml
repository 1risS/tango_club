services:
  postgres:
    image: postgres:16-alpine
    container_name: omen_tango_club_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: omen_tango_club
      POSTGRES_USER: omen_app
      POSTGRES_PASSWORD: omen_local_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omen_app -d omen_tango_club"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - omen_tango_club_postgres_data:/var/lib/postgresql/data

volumes:
  omen_tango_club_postgres_data: